<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥚 Egg Counting AI Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="header">
    <h1>🥚 Egg Counting AI Dashboard</h1>
</div>

<div class="container">

    <div class="left">

        <h2>📷 Live Camera</h2>

        <div class="camera">
            <img src="{{ url_for('video') }}" class="camera-feed">
        </div>

        <!-- ปุ่มดาวน์โหลด CSV -->
        <div style="margin-top:20px; text-align:center;">

            <a href="/download_csv" class="save-btn" download>
                💾 ดาวน์โหลดไฟล์ CSV
            </a>

        </div>

    </div>

    <div class="right">

        <div class="card">
            <h3>🥚 จำนวนไข่ปัจจุบัน</h3>
            <p><span id="count">0</span></p>
        </div>

        <div class="card">
            <h3>📈 จำนวนไข่สะสม</h3>
            <p><span id="total">0</span></p>
        </div>

        <div class="card">
            <h3>🎯 Confidence</h3>
            <p><span id="conf">0</span>%</p>
        </div>

        <div class="card">
            <h3>⚡ FPS</h3>
            <p><span id="fps">0</span></p>
        </div>

        <div class="card">
            <h3>🟢 AI Status</h3>
            <p id="status">ONLINE</p>
        </div>

        <div class="card">
            <h3>🕒 เวลา</h3>
            <p id="time">--:--:--</p>
        </div>

    </div>

</div>

<div class="history">

    <h2>📋 ประวัติการตรวจจับ</h2>

    <table>

        <thead>
            <tr>
                <th>เวลา</th>
                <th>จำนวนไข่</th>
            </tr>
        </thead>

        <tbody id="history">

        </tbody>

    </table>

</div>

<script>

window.addEventListener("load", function () {

    function updateClock() {

        const t = document.getElementById("time");

        if (t) {
            t.textContent = new Date().toLocaleTimeString("th-TH");
        }

    }

    function updateDashboard() {

        fetch("/data")

        .then(res => res.json())

        .then(data => {

            document.getElementById("count").textContent =
                data.count ?? 0;

            document.getElementById("total").textContent =
                data.total ?? 0;

            document.getElementById("conf").textContent =
                Number(data.confidence ?? 0).toFixed(1);

            document.getElementById("fps").textContent =
                Number(data.fps ?? 0).toFixed(1);

            document.getElementById("status").textContent =
                data.status ?? "ONLINE";

            let html = "";

            if (Array.isArray(data.history)) {

                data.history.forEach(item => {

                    html += `
                    <tr>
                        <td>${item.time}</td>
                        <td>${item.count}</td>
                    </tr>
                    `;

                });

            }

            document.getElementById("history").innerHTML = html;

        })

        .catch(function(err){

            console.log(err);

            document.getElementById("status").textContent = "OFFLINE";

        });

    }

        updateClock();
    updateDashboard();

    setInterval(updateClock,1000);
    setInterval(updateDashboard,500);

});

</script>

</body>
</html>
